name: Tests

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Prepare example datasets
        run: |
          python scripts/prepare_datasets.py --list
          python scripts/prepare_datasets.py --suite example_datasets
          python scripts/prepare_datasets.py --list

      - name: Build Jupyter sandbox image
        run: docker build -f Dockerfile.sandbox -t autovibe-gym-sandbox:latest .

      - name: Run tests with coverage
        run: |
          python -m pytest \
            --cov=gym \
            --cov=experiments \
            --cov=scripts \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
